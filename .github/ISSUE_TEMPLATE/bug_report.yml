name: Bug report
description: Something isn't working
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for the report. Please don't include API keys or customer data.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "e.g. v1.1.0"
  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Self-hosted (n8n)
        - Cloud
        - Website
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Paste relevant logs. Redact secrets.
      render: shell
